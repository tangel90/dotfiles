# BEGIN_KITTY_FONTS
font_family      postscript_name=MonaspaceNeon-Regular    features="+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08"
bold_font        postscript_name=MonaspaceNeon-Bold       features="+calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08"
italic_font      postscript_name=MonaspaceNeon-Italic     features="-calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08"
bold_italic_font postscript_name=MonaspaceNeon-BoldItalic features="-calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08"
# END_KITTY_FONTS

symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD,U+100000-U+10FFFD Symbols Nerd Font Mono

font_size 16.0
enable_audio_bell yes
visual_bell_duration 0.0
confirm_os_window_close 0

# BEGIN_KITTY_THEME
# Light themes available: gruvbox-light.conf, rose-pine-dawn.conf, solarized-light.conf
# Dark theme (original Rosé Pine Moon): current-theme.conf
include rose-pine-moon.conf
# END_KITTY_THEME
