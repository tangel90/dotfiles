# BEGIN_KITTY_FONTS
font_family      family="MonaspiceNe Nerd Font Mono" features="+calt +liga"
bold_font        family="MonaspiceNe Nerd Font Mono" features="+calt +liga"
italic_font      family="MonaspiceNe Nerd Font Mono" features="+calt +liga"
bold_italic_font family="MonaspiceNe Nerd Font Mono" features="+calt +liga"
# END_KITTY_FONTS

font_size 16.0
enable_audio_bell yes
visual_bell_duration 0.0
confirm_os_window_close 0

# BEGIN_KITTY_THEME
# Rosé Pine Moon
include current-theme.conf
# END_KITTY_THEME
