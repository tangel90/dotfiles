# SECTION KEYBINDINGS [
unbind C-b
set -g prefix C-k
bind C-k send-prefix

# Alt motion keys to resize panes
bind -n M-b select-pane -t :.+ \; resize-pane -Z
bind -n M-u select-pane -t :.+ \; resize-pane -Z
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-K resize-pane -U 5
bind -n M-J resize-pane -D 5
bind -n M-m resize-pane -Z 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# Shift Alt vim keys to switch windows
bind -n M-h previous-window
bind -n M-l next-window

bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind C-f "copy-mode; send-keys '?'"
bind C-j "copy-mode"
bind C-u "copy-mode; send-keys 'C-u'"

bind N command-prompt -p "session name:" "new-session -s '%%'"
bind f command-prompt -p "switch to session:" "switch-client -t '%%'"
bind R command-prompt "rename-window '%%'"

bind b new-window btm
bind c new-window -c "#{pane_current_path}"
bind e new-window -c "#{pane_current_path}" yazi
bind g new-window -c "#{pane_current_path}" lazygit
bind i new-window -c "#{pane_current_path}" -n "iPython" ipython
bind N new-window -c "$HOME/notes" -n "NOTES" nvim
bind u new-window -n "Codex" "codex"
bind p new-window "zsh -il -c 'open-pass'"
bind P new-window "zsh -il -c 'open-pass show'"
bind a new-window "$HOME/.local/bin/open-tmp"
bind R new-window "$HOME/.local/bin/script-runner"
bind w new-window "$HOME/.local/bin/tmux-windowizer pwd"
bind W new-window "$HOME/.local/bin/tmux-windowizer"
bind o new-window "$HOME/.local/bin/tmux-sessionizer"

bind d display-popup -E open-postgres 'local'
bind D display-popup -E open-postgres 'prod'
bind t display-popup -d "#{env:HOME}" -T "cmd" -w 80 -h 20
bind T display-popup -d "#{pane_current_path}" -T "temp" -w 80 -h 30

bind s choose-session -F '#{pane_current_path}'
# bind -n C-b choose-session -F '#{pane_current_path}'

bind q kill-pane
bind tab last-window

bind r run-shell tmux-run-command
bind z run-shell " \
  tmux source-file ~/.config/tmux/tmux.conf > /dev/null; \
  tmux display-message 'Sourced ~/.config/tmux/tmux.conf !'"

bind n if-shell "tmux list-windows -F '##{window_name}' | grep -Fxq nvim" \
  "select-window -t :=nvim" \
  "new-window -n nvim -c '#{pane_current_path}' nvim"
bind U if-shell "tmux has-session -t llm >/dev/null 2>&1" \
  "switch-client -t llm" \
  "new-session -s llm -c \"#{env:HOME/projects}\" \"~/.local/bin/codex\""
bind 0 if-shell "tmux has-session -t workspace0 >/dev/null 2>&1" \
  "switch-client -t workspace0" \
  "new-session -s workspace0 -c ~/ "


# ]

# SECTION PLUGINS [

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'rose-pine/tmux'

set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'
set -g @rose_pine_directory on
set -g @rose_pine_window_status_separator ' • '
set -g @rose_pine_date_time '%d-%b %H:%M'
set -g @rose_pine_disable_active_window_menu on

run '~/.tmux/plugins/tpm/tpm'
# run '~/.tmux/plugins/tmux-sensible/sensible.tmux'

# ]

set-option -g detach-on-destroy off

# SECTION OPTIONS AND SETTINGS [

set -g focus-events on
set -g status-style bg=default
set -g status-left-length 99
set -g status-right-length 99
# set -g status-justify absolute-centre

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0set -as terminal-features ",*:RGB"
# set -ag terminal-overrides ",xterm-256color:RGB"

# set-option -g default-command 'zsh -l'
set-option -g default-shell /bin/zsh

# setting necessary for image.nvim
set -gq allow-passthrough on
set -g visual-activity off

set -g mouse on

set-option -g repeat-time 0
# command delay? We don't want that, make it short
set -g escape-time 10
# Reduce time to wait for Escape key. You'll want this for neovim.
set-option escape-time 20


# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g renumber-windows on    # renumber windows when a window is closed

# set vi-mode
set-window-option -g mode-keys vi

# ]

